<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Skill Credential Aggregator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <img src="logo.png" alt="Skill Credential Aggregator Logo" class="logo">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access your secure dashboard</p>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="name@domain.com">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••">
        </div>

        <button onclick="login()">Sign In to Dashboard</button>

        <p class="link-text">New to the platform? <a href="register.html" class="link">Create an Account</a></p>

        <script src="script.js"></script>
    </div>
</body>

</html>
