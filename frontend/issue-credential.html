<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Credential - Skill Credential Aggregator</title>
</head>

<body>
    <h1>Issue Credential</h1>
    <p>Only institutions can issue credentials</p>

    <form id="issueForm">
        <div>
            <label>Student Email:</label><br>
            <input type="email" id="student_email" placeholder="student@example.com" required>
        </div>
        <br>
        <div>
            <label>Skill Name:</label><br>
            <input type="text" id="skill_name" placeholder="e.g. Python Programming" required>
        </div>
        <br>
        <div>
            <label>Issuer Name:</label><br>
            <input type="text" id="issuer_name" placeholder="e.g. MIT University" required>
        </div>
        <br>
        <button type="submit">Issue & Record on Blockchain</button>
    </form>

    <div id="message"></div>
    <div id="credentialInfo"></div>

    <script>
        // Get JWT token from localStorage
        const token = localStorage.getItem('token');

        // If no token, redirect to login
        if (!token) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        // Handle form submission
        document.getElementById('issueForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const student_email = document.getElementById('student_email').value;
            const skill_name = document.getElementById('skill_name').value;
            const issuer_name = document.getElementById('issuer_name').value;

            try {
                // Send POST request to backend
                const response = await fetch('http://localhost:5000/issue-credential', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token  // Send JWT token
                    },
                    body: JSON.stringify({
                        student_email: student_email,
                        skill_name: skill_name,
                        issuer_name: issuer_name
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    document.getElementById('message').innerHTML =
                        '<p style="color: green;">' + data.message + '</p>';

                    // Display credential information
                    document.getElementById('credentialInfo').innerHTML =
                        '<h3>Credential Details:</h3>' +
                        '<p>Credential ID: ' + data.credential_id + '</p>' +
                        '<p>Credential Hash: ' + data.credential_hash + '</p>' +
                        '<p>Issue Date: ' + data.issue_date + '</p>';

                    // Clear form
                    document.getElementById('issueForm').reset();
                } else {
                    // Error
                    document.getElementById('message').innerHTML =
                        '<p style="color: red;">' + data.message + '</p>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML =
                    '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        });
    </script>
</body>

</html>
